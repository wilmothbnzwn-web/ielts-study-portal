<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收集 — IELTS Study Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43' } }, fontFamily: { serif: ['Georgia', 'Times New Roman', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.0" } }
  </script>
  <style>
    body { background: #fafbfc; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #243b53; color: #fff; }
    /* ── VocabCard flip animation ── */
    .card { transition: all 0.25s ease; cursor: pointer; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
    .card-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
    .card-front, .card-back { backface-visibility: hidden; }
    .card-back { transform: rotateY(180deg); position: absolute; inset: 0; }
    .theme-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
    .difficulty-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 2px; flex-shrink: 0; }
    .difficulty-dot.filled { background: #334e68; }
    .difficulty-dot.empty { background: #d9e2ec; }
    /* ── Legacy collection styles ── */
    .vocab-card { transition: all 0.2s ease; }
    .vocab-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
    .context-highlight { background: #fef3c7; color: #92400e; padding: 0 4px; border-radius: 3px; font-weight: 600; }
    .syn-tag { display: inline-block; padding: 2px 10px; background: #f0f4f8; color: #486581; border-radius: 999px; font-size: 0.7rem; font-weight: 500; }
    .audio-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; border: 1px solid #d9e2ec; background: #fff; cursor: pointer; transition: all 0.15s; color: #627d98; font-size: 14px; }
    .audio-btn:hover { background: #334e68; color: #fff; border-color: #334e68; }
    .audio-btn.playing { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(51,78,104,0.2); } 50% { box-shadow: 0 0 0 8px rgba(51,78,104,0); } }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.6; }
  </style>
</head>
<body class="font-sans text-brand-800 antialiased min-h-screen flex flex-col">

  <!-- Header (rendered by navbar.js) -->
  <div id="navbar-container"></div>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-8 flex-grow w-full">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-6 gap-3">
      <div>
        <h1 class="text-2xl sm:text-3xl font-serif font-bold text-brand-900 mb-1">📚 我的收集</h1>
        <p class="text-sm sm:text-base text-brand-500">阅读中保存的单词与句子 · 本地持久化存储</p>
      </div>
      <!-- Tabs -->
      <div class="flex gap-1 bg-brand-50 rounded-xl p-1">
        <button class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium" onclick="switchTab('words')">📝 我的单词</button>
        <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-brand-600" onclick="switchTab('sentences')">📄 我的句子</button>
      </div>
    </div>

    <!-- Words Tab -->
    <div id="tab-words" class="space-y-4">
      <div id="words-container"></div>
    </div>

    <!-- Sentences Tab -->
    <div id="tab-sentences" class="space-y-4" style="display:none;">
      <div id="sentences-container"></div>
    </div>
  </main>

  <footer class="border-t border-brand-100 py-6 px-6 bg-white/50 mt-8">
    <div class="max-w-6xl mx-auto text-center text-xs text-brand-400">
      <p>IELTS Study Portal · Collection synced to your account via Supabase</p>
    </div>
  </footer>

  <!-- Supabase modules: auth store + auth guard + navbar + db bridge -->
  <script type="module" src="./js/auth-store.js"></script>
  <script type="module" src="./js/auth-guard.js"></script>
  <script type="module" src="./js/navbar.js"></script>
  <script type="module">
    import { renderNavbar } from './js/navbar.js';
    import { initAuth, authStore } from './js/auth-store.js';
    import { getMyWords, saveMyWords, deleteWord, getMySentences, saveMySentences, deleteSentence } from './js/db.js';

    await initAuth();
    renderNavbar();

    // Bridge: expose Supabase-backed helpers to the inline script
    window._db = { getMyWords, saveMyWords, deleteWord, getMySentences, saveMySentences, deleteSentence };
    window._auth = authStore;
  </script>

  <script src="js/vocab-card.js"></script>
  <script>
    // All data operations now go through Supabase via window._db
    // (set up by the module script above — runs before user interaction)

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-words').style.display = tab === 'words' ? 'block' : 'none';
      document.getElementById('tab-sentences').style.display = tab === 'sentences' ? 'block' : 'none';
      if (tab === 'words') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.remove('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.querySelectorAll('.tab-btn')[0].classList.remove('active');
      }
    }

    /**
     * Adapter: map localStorage myWord entry → VocabCard props.
     * myWords lacks pos/definition/example/theme/difficulty;
     * contextSentence doubles as example for the back side.
     */
    function adaptMyWord(w) {
      var ctxHtml = '';
      if (w.contextSentence) {
        ctxHtml = highlightWord(w.contextSentence, w.word);
      }
      return {
        id: w.id,
        word: w.word,
        chinese: w.chinese || '',
        phonetic: w.phonetic || '',
        audioUrl: w.audioUrl || '',
        synonyms: w.synonyms || [],
        definition: '',                        // not available from reading lookup
        example: '',                           // use contextSentence instead
        contextSentence: w.contextSentence || '',
        contextHtml: ctxHtml,                  // pre-highlighted version for front
        pos: '',
        theme: '',
        difficulty: 0,
      };
    }

    async function renderWords() {
      const words = window._db ? await window._db.getMyWords() : [];
      const container = document.getElementById('words-container');

      if (words.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <h3 class="text-lg font-bold text-brand-700 mb-2">还没有收藏单词</h3>
            <p class="text-sm text-brand-400 mb-4">去 <a href="./reading.html" class="text-brand-600 underline">阅读训练</a> 选中单词，点击工具提示中的"加入收藏"即可</p>
            <a href="./reading.html" class="inline-block px-5 py-2.5 bg-brand-800 text-white rounded-xl text-sm font-medium hover:bg-brand-900 transition-colors">去阅读文章 →</a>
          </div>`;
        return;
      }

      // Render VocabCards inside a responsive grid
      var cardsHtml = words.map(function (w) {
        var adapted = adaptMyWord(w);
        return VocabCard(adapted, {
          flippable: true,
          showAudio: true,
          showDelete: true,
          showTimestamp: true,
          cardIdPrefix: 'myword',
          savedAt: w.savedAt,
        });
      }).join('');

      container.innerHTML = '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">' + cardsHtml + '</div>';
    }

    function highlightWord(sentence, word) {
      if (!sentence || !word) return escapeHtml(sentence || '');
      const escaped = sentence.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      try {
        const regex = new RegExp(`\\b(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})\\b`, 'gi');
        return escapeHtml(sentence).replace(
          new RegExp(`\\b(${escapeHtml(word)})\\b`, 'gi'),
          '<mark class="context-highlight">$1</mark>'
        );
      } catch(e) {
        return escapeHtml(sentence);
      }
    }

    async function renderSentences() {
      const sentences = window._db ? await window._db.getMySentences() : [];
      const container = document.getElementById('sentences-container');

      if (sentences.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <h3 class="text-lg font-bold text-brand-700 mb-2">还没有收藏句子</h3>
            <p class="text-sm text-brand-400 mb-4">去 <a href="./reading.html" class="text-brand-600 underline">阅读训练</a> 选中长句，点击工具提示中的"加入收藏"即可</p>
            <a href="./reading.html" class="inline-block px-5 py-2.5 bg-brand-800 text-white rounded-xl text-sm font-medium hover:bg-brand-900 transition-colors">去阅读文章 →</a>
          </div>`;
        return;
      }

      container.innerHTML = sentences.map(s => {
        const hfwHtml = s.highFreqWords && s.highFreqWords.length
          ? `<div class="flex flex-wrap gap-1.5 mt-3">
              <span class="text-xs text-brand-400 font-semibold">🏷 高频词汇:</span>
              ${s.highFreqWords.map(h => `<span class="syn-tag bg-amber-50 text-amber-700">${escapeHtml(h.word)} <span class="text-amber-400">${escapeHtml(h.chinese)}</span></span>`).join('')}
            </div>`
          : '<p class="text-xs text-brand-300 mt-3">未匹配到高频词汇</p>';

        return `
        <div class="vocab-card bg-white rounded-2xl border border-brand-100 p-4 sm:p-5">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <p class="text-brand-800 leading-relaxed font-serif">${escapeHtml(s.sentence)}</p>
              <p class="text-sm text-brand-600 font-medium mt-2">${escapeHtml(s.chinese)}</p>
              ${hfwHtml}
            </div>
            <button class="text-xs text-brand-300 hover:text-red-500 transition-colors flex-shrink-0 mt-1" onclick="deleteSentence(${s.id})" title="删除">🗑</button>
          </div>
          <p class="text-xs text-brand-300 mt-3">${new Date(s.savedAt).toLocaleString('zh-CN')}</p>
        </div>`;
      }).join('');
    }

    async function deleteWord(id) {
      if (window._db) {
        await window._db.deleteWord(id);
      }
      renderWords();
    }

    async function deleteSentence(id) {
      if (window._db) {
        await window._db.deleteSentence(id);
      }
      renderSentences();
    }

    // Init — render once module scripts have set up window._db
    (async function init() {
      // Wait a tick for module scripts to execute
      if (!window._db) {
        await new Promise(r => { const check = () => { if (window._db) r(); else setTimeout(check, 50); }; check(); });
      }
      renderWords();
      renderSentences();
    })();
  </script>
</body>
</html>
