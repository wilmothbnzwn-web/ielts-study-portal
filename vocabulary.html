<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>词书大厅 — IELTS Study Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43' } }, fontFamily: { serif: ['Georgia', 'Times New Roman', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.0" } }
  </script>
  <style>
    body { background: #f8fafc; }
    .deck-cover {
      position: relative;
      min-height: 220px;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .deck-cover:hover {
      transform: translateY(-6px) scale(1.018);
      box-shadow: 0 18px 48px rgba(16, 42, 67, 0.12);
      border-color: #9fb3c8;
    }
    .deck-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.64)),
        radial-gradient(circle at 92% 12%, rgba(98,125,152,0.18), transparent 34%),
        linear-gradient(140deg, rgba(219,226,236,0.62), rgba(240,244,248,0.2));
      pointer-events: none;
    }
    .deck-spine {
      position: absolute;
      inset: 0 auto 0 0;
      width: 9px;
      background: linear-gradient(180deg, #334e68, #829ab1);
    }
    .deck-content { position: relative; z-index: 1; }
    .deck-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      background: #e0f2fe;
      color: #075985;
    }
    .deck-count {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      background: #ecfdf5;
      color: #047857;
    }
    .mini-word {
      display: inline-flex;
      max-width: 100%;
      border-radius: 7px;
      border: 1px solid #d9e2ec;
      background: rgba(255,255,255,0.76);
      color: #486581;
      padding: 4px 7px;
      font-size: 0.72rem;
      line-height: 1;
    }
  </style>
</head>
<body class="font-sans text-brand-800 antialiased min-h-screen flex flex-col">
  <div id="navbar-container"></div>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-7 sm:py-9 flex-grow w-full">
    <section class="mb-7 sm:mb-9">
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.18em] text-brand-400 mb-2">Vocabulary Deck Library</p>
          <h1 class="text-2xl sm:text-4xl font-serif font-bold text-brand-900 mb-2">词书大厅</h1>
          <p id="deck-summary" class="text-sm sm:text-base text-brand-500">正在整理词包...</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-2 sm:items-center">
          <select id="tag-filter" class="text-sm border border-brand-200 rounded-lg px-3 py-2 bg-white text-brand-700 focus:outline-none focus:border-brand-500" onchange="filterDecks()">
            <option value="all">全部主题</option>
          </select>
          <input id="deck-search" type="search" placeholder="搜索词包"
            class="text-sm border border-brand-200 rounded-lg px-3 py-2 bg-white text-brand-700 focus:outline-none focus:border-brand-500"
            oninput="filterDecks()">
        </div>
      </div>
    </section>

    <section id="deck-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
      <p class="text-brand-400 col-span-full">Loading vocabulary decks...</p>
    </section>
  </main>

  <footer class="border-t border-brand-100 py-6 px-6 bg-white/60 mt-8">
    <div class="max-w-6xl mx-auto text-center text-xs text-brand-400">
      <p>IELTS Study Portal · Vocabulary decks generated from academic IELTS word data</p>
    </div>
  </footer>

  <script src="/js/vocab-decks.js"></script>
  <script>
    let allDecks = [];

    fetch('/api/vocabulary')
      .then(function (r) { return r.json(); })
      .then(function (words) {
        allDecks = buildVocabularyDecks(words);
        renderFilterOptions(allDecks);
        renderDecks(allDecks);
        document.getElementById('deck-summary').textContent =
          allDecks.length + ' 个词包 · ' + words.length + ' IELTS Academic Core Words · 每包约 20-30 词';
      })
      .catch(function (e) {
        console.error('Failed to load vocabulary decks', e);
        document.getElementById('deck-grid').innerHTML = '<p class="text-brand-400 col-span-full text-center py-12">词包加载失败，请刷新页面重试</p>';
      });

    function renderFilterOptions(decks) {
      const select = document.getElementById('tag-filter');
      const tags = Array.from(new Set(decks.map(function (deck) { return deck.tag; })));
      select.innerHTML = '<option value="all">全部主题</option>' + tags.map(function (tag) {
        return '<option value="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</option>';
      }).join('');
    }

    function renderDecks(decks) {
      const grid = document.getElementById('deck-grid');
      if (!decks.length) {
        grid.innerHTML = '<p class="text-brand-400 col-span-full text-center py-12">没有匹配的词包。</p>';
        return;
      }

      grid.innerHTML = decks.map(function (deck) {
        const previewWords = deck.words.slice(0, 5).map(function (word) {
          return '<span class="mini-word truncate">' + escapeHtml(word.word) + '</span>';
        }).join('');

        return '<a href="/vocab/deck/' + encodeURIComponent(deck.id) + '" class="deck-cover bg-white rounded-lg border border-brand-100 p-5 sm:p-6 no-underline block">' +
          '<span class="deck-spine"></span>' +
          '<div class="deck-content h-full flex flex-col">' +
            '<div class="flex items-start justify-between gap-3 mb-7">' +
              '<span class="deck-tag">' + escapeHtml(deck.tag) + '</span>' +
              '<span class="deck-count">' + deck.wordCount + ' Words</span>' +
            '</div>' +
            '<h2 class="text-xl sm:text-2xl font-serif font-bold text-brand-900 leading-tight mb-3">' + escapeHtml(deck.title) + '</h2>' +
            '<p class="text-sm text-brand-500 mb-5">Part ' + deck.part + ' / ' + deck.totalParts + ' · 单张翻卡学习模式</p>' +
            '<div class="flex flex-wrap gap-1.5 mt-auto">' + previewWords + '</div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    window.filterDecks = function () {
      const tag = document.getElementById('tag-filter').value;
      const query = document.getElementById('deck-search').value.trim().toLowerCase();
      const filtered = allDecks.filter(function (deck) {
        const tagMatch = tag === 'all' || deck.tag === tag;
        const queryMatch = !query ||
          deck.title.toLowerCase().includes(query) ||
          deck.tag.toLowerCase().includes(query) ||
          deck.words.some(function (word) { return word.word.toLowerCase().includes(query); });
        return tagMatch && queryMatch;
      });
      renderDecks(filtered);
    };

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }
  </script>

  <script type="module" src="/js/auth-store.js"></script>
  <script type="module" src="/js/navbar.js"></script>
  <script type="module">
    import { renderNavbar } from '/js/navbar.js';
    import { initAuth } from '/js/auth-store.js';
    await initAuth();
    renderNavbar();
  </script>
</body>
</html>
