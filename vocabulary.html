<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高频词汇 — IELTS Study Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43' } }, fontFamily: { serif: ['Georgia', 'Times New Roman', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <style>
    body { background: #fafbfc; }
    .card { transition: all 0.25s ease; cursor: pointer; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
    .card-front, .card-back { backface-visibility: hidden; }
    .card-back { transform: rotateY(180deg); position: absolute; inset: 0; }
    .theme-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
    .difficulty-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 2px; flex-shrink: 0; }
    .difficulty-dot.filled { background: #334e68; }
    .difficulty-dot.empty { background: #d9e2ec; }
    .audio-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; border: 1px solid #d9e2ec; background: #fff; cursor: pointer; transition: all 0.15s; color: #627d98; font-size: 14px; flex-shrink: 0; }
    .audio-btn:hover { background: #334e68; color: #fff; border-color: #334e68; }
    .audio-btn.playing { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(51,78,104,0.2); } 50% { box-shadow: 0 0 0 8px rgba(51,78,104,0); } }
  </style>
</head>
<body class="font-sans text-brand-800 antialiased min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-brand-100 bg-white/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 sm:gap-3 no-underline flex-shrink-0">
        <div class="w-8 h-8 sm:w-9 sm:h-9 bg-brand-800 rounded-lg flex items-center justify-center text-white font-bold text-sm">I</div>
        <div class="hidden sm:block"><h1 class="text-lg font-bold text-brand-900 leading-tight">IELTS Study Portal</h1><p class="text-xs text-brand-400">Academic Reading & Writing</p></div>
      </a>
      <!-- Desktop nav -->
      <nav class="hidden sm:flex gap-1 text-sm">
        <a href="/" class="px-3 py-2 text-brand-500 hover:text-brand-900 rounded-lg transition-colors">首页</a>
        <a href="/mock-test.html" class="px-3 py-2 text-brand-500 hover:text-brand-900 rounded-lg transition-colors">机考模拟</a>
        <a href="/writing.html" class="px-3 py-2 text-brand-500 hover:text-brand-900 rounded-lg transition-colors">写作</a>
        <a href="/reading.html" class="px-3 py-2 text-brand-500 hover:text-brand-900 rounded-lg transition-colors">阅读</a>
        <a href="/vocabulary.html" class="px-3 py-2 bg-brand-800 text-white rounded-lg font-medium">词汇</a>
        <a href="/collection.html" class="px-3 py-2 text-brand-500 hover:text-brand-900 rounded-lg transition-colors">我的收集</a>
      </nav>
      <!-- Mobile nav -->
      <div class="sm:hidden flex gap-1">
        <a href="/" class="text-xs px-2 py-1.5 bg-brand-50 text-brand-700 rounded-md">首页</a>
        <a href="/mock-test.html" class="text-xs px-2 py-1.5 bg-brand-800 text-white rounded-md">机考</a>
        <a href="/reading.html" class="text-xs px-2 py-1.5 bg-brand-50 text-brand-700 rounded-md">阅读</a>
        <a href="/vocabulary.html" class="text-xs px-2 py-1.5 bg-brand-800 text-white rounded-md">词汇</a>
        <a href="/collection.html" class="text-xs px-2 py-1.5 bg-brand-50 text-brand-700 rounded-md">收集</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8 flex-grow w-full">
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-6 sm:mb-8 gap-3 sm:gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-serif font-bold text-brand-900 mb-1">高频学术词汇</h1>
        <p class="text-sm sm:text-base text-brand-500">288 IELTS Academic Core Words · 中英释义 · 同义替换 · 例句语境 · 发音音频</p>
      </div>
      <!-- Filter — full-width on mobile -->
      <div class="flex gap-2">
        <select id="theme-filter" class="flex-1 sm:flex-none text-sm border border-brand-200 rounded-lg px-3 py-2 bg-white text-brand-700 focus:outline-none focus:border-brand-500 w-full sm:w-auto" onchange="filterCards()">
          <option value="all">全部主题</option>
          <option value="Academic & Research">学术与研究</option>
          <option value="Economy & Trade">经济与贸易</option>
          <option value="Environment & Development">环境与发展</option>
          <option value="Social Development">社会发展</option>
          <option value="Technology & Society">科技与社会</option>
          <option value="Politics & Governance">政治与治理</option>
        </select>
        <select id="difficulty-filter" class="flex-1 sm:flex-none text-sm border border-brand-200 rounded-lg px-3 py-2 bg-white text-brand-700 focus:outline-none focus:border-brand-500 w-full sm:w-auto" onchange="filterCards()">
          <option value="all">全部难度</option>
          <option value="2">★ 基础</option>
          <option value="3">★★ 中等</option>
          <option value="4">★★★ 较难</option>
          <option value="5">★★★★ 高级</option>
        </select>
      </div>
    </div>

    <!-- Vocabulary Grid -->
    <div id="vocab-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-4">
      <p class="text-brand-400 col-span-full">Loading vocabulary...</p>
    </div>
  </main>

  <footer class="border-t border-brand-100 py-6 px-6 bg-white/50 mt-8">
    <div class="max-w-6xl mx-auto text-center text-xs text-brand-400">
      <p>IELTS Study Portal · Vocabulary curated from academic articles and IELTS exam preparation materials</p>
    </div>
  </footer>

  <script src="js/vocab-card.js"></script>
  <script>
    let allWords = [];

    fetch('/api/vocabulary')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        allWords = data;
        renderCards(allWords);
      })
      .catch(function (e) {
        console.error('Failed to load vocabulary data', e);
        document.getElementById('vocab-grid').innerHTML = '<p class="text-brand-400 col-span-full text-center py-12">词库加载失败，请刷新页面重试</p>';
      });

    function renderCards(words) {
      const grid = document.getElementById('vocab-grid');
      if (words.length === 0) {
        grid.innerHTML = '<p class="text-brand-400 col-span-full text-center py-12">没有匹配的词汇。</p>';
        return;
      }
      grid.innerHTML = words.map(function (w) {
        return VocabCard(w, {
          flippable: true,
          showAudio: true,
          showDelete: false,
          showTimestamp: false,
          cardIdPrefix: 'vocab',
        });
      }).join('');
    }

    window.filterCards = function() {
      const theme = document.getElementById('theme-filter').value;
      const diff = document.getElementById('difficulty-filter').value;
      let filtered = allWords;
      if (theme !== 'all') filtered = filtered.filter(w => w.theme === theme);
      if (diff !== 'all') filtered = filtered.filter(w => w.difficulty === parseInt(diff));
      renderCards(filtered);
    };
  </script>
</body>
</html>
