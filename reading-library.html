<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读题库 — IELTS Study Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43' } }, fontFamily: { serif: ['Georgia', 'Times New Roman', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.0" } }
  </script>
  <style>
    body { background: #fafbfc; }

    /* ===== Test Card ===== */
    .test-card {
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
    }
    .test-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(16,42,67,0.10);
    }
    .test-card:hover .card-arrow {
      transform: translateX(4px);
    }
    .card-arrow {
      transition: transform 0.25s ease;
    }

    /* ===== Topic Tags ===== */
    .topic-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .topic-science { background: #dbeafe; color: #1e40af; }
    .topic-environment { background: #d1fae5; color: #065f46; }
    .topic-history { background: #fef3c7; color: #92400e; }
    .topic-economics { background: #fce7f3; color: #9d174d; }
    .topic-sociology { background: #ede9fe; color: #5b21b6; }
    .topic-technology { background: #ffedd5; color: #9a3412; }

    /* ===== Difficulty Dots ===== */
    .difficulty-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .difficulty-dot.filled { background: #334e68; }
    .difficulty-dot.empty { background: #d9e2ec; }

    /* ===== Skeletons ===== */
    .skeleton { background: linear-gradient(90deg, #f0f4f8 25%, #e2e8f0 50%, #f0f4f8 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ===== Sidebar ===== */
    .sidebar-item {
      transition: all 0.2s ease;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover {
      background: #f0f4f8;
      border-left-color: #bcccdc;
    }
    .sidebar-item.active {
      background: #ede9fe;
      border-left-color: #5b21b6;
      color: #5b21b6;
      font-weight: 600;
    }
    .sidebar-item .count-badge {
      transition: all 0.2s ease;
    }
    .sidebar-item.active .count-badge {
      background: #5b21b6;
      color: #fff;
    }

    /* ===== Section Header ===== */
    .section-header {
      position: relative;
      padding-left: 16px;
    }
    .section-header::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 4px;
      border-radius: 2px;
      background: #5b21b6;
    }

    /* ===== Mobile sidebar (horizontal scroll) ===== */
    .mobile-sidebar::-webkit-scrollbar { display: none; }
    .mobile-sidebar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans text-brand-800 antialiased min-h-screen flex flex-col">

  <!-- Header (rendered by navbar.js) -->
  <div id="navbar-container"></div>

  <!-- ===== MAIN LAYOUT: Sidebar + Content ===== -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 flex-grow w-full">
    <div class="flex flex-col lg:flex-row gap-8">

      <!-- ===== LEFT SIDEBAR (Desktop: vertical; Mobile: horizontal scroll) ===== -->
      <aside class="lg:w-64 lg:flex-shrink-0">
        <!-- Desktop sidebar -->
        <div class="hidden lg:block sticky top-24">
          <h2 class="text-xs font-semibold text-brand-400 uppercase tracking-wider mb-3 px-3">分类导航</h2>

          <!-- All -->
          <div class="sidebar-item active px-4 py-2.5 rounded-r-lg mb-0.5 flex items-center justify-between text-sm"
               data-category="__all__" onclick="selectCategory('__all__')">
            <span>📚 全部题目</span>
            <span class="count-badge text-xs bg-brand-100 text-brand-600 px-2 py-0.5 rounded-full" id="count-all">115</span>
          </div>

          <!-- Official Cambridge Mocks — promoted to top-level -->
          <div class="sidebar-item px-4 py-2.5 rounded-r-lg mb-0.5 flex items-center justify-between text-sm"
               data-category="__official_cambridge__" onclick="selectCategory('__official_cambridge__')" style="border-left-color: #dc2626;">
            <span>🏛️ 官方真题</span>
            <span class="count-badge text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full" id="count-official-cambridge">-</span>
          </div>

          <!-- Divider -->
          <p class="text-xs font-semibold text-brand-400 uppercase tracking-wider mt-6 mb-3 px-3">按话题分类</p>

          <!-- Topic categories -->
          <div id="sidebar-topics"></div>

          <!-- Divider -->
          <p class="text-xs font-semibold text-brand-400 uppercase tracking-wider mt-6 mb-3 px-3">按来源分类</p>

          <!-- Source categories -->
          <div class="sidebar-item px-4 py-2.5 rounded-r-lg mb-0.5 flex items-center justify-between text-sm"
               data-category="__prediction__" onclick="selectCategory('__prediction__')">
            <span>🔮 预测机经</span>
            <span class="count-badge text-xs bg-brand-100 text-brand-600 px-2 py-0.5 rounded-full" id="count-prediction">-</span>
          </div>
        </div>

        <!-- Mobile horizontal scroll tabs -->
        <div class="lg:hidden mobile-sidebar overflow-x-auto pb-2 -mx-1">
          <div class="flex gap-2 px-1" id="mobile-tabs">
            <!-- Filled by JS -->
          </div>
        </div>
      </aside>

      <!-- ===== RIGHT CONTENT AREA ===== -->
      <main class="flex-1 min-w-0">

        <!-- Category Title + Stats -->
        <div class="mb-8" id="content-header">
          <div class="skeleton" style="width:200px;height:32px;margin-bottom:8px;"></div>
          <div class="skeleton" style="width:300px;height:20px;"></div>
        </div>

        <!-- Sections Container -->
        <div id="sections-container">
          <!-- Skeleton loading -->
          <div class="mb-10">
            <div class="skeleton" style="width:180px;height:24px;margin-bottom:16px;"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div class="bg-white rounded-2xl border border-brand-100 p-6">
                <div class="skeleton" style="width:80px;height:22px;margin-bottom:16px;"></div>
                <div class="skeleton" style="width:100%;height:24px;margin-bottom:8px;"></div>
                <div class="skeleton" style="width:70%;height:14px;margin-bottom:6px;"></div>
                <div class="skeleton" style="width:90%;height:14px;margin-bottom:16px;"></div>
                <div class="flex gap-3">
                  <div class="skeleton" style="width:60px;height:14px;"></div>
                  <div class="skeleton" style="width:80px;height:14px;"></div>
                </div>
              </div>
              <div class="bg-white rounded-2xl border border-brand-100 p-6 hidden lg:block">
                <div class="skeleton" style="width:80px;height:22px;margin-bottom:16px;"></div>
                <div class="skeleton" style="width:100%;height:24px;margin-bottom:8px;"></div>
                <div class="skeleton" style="width:60%;height:14px;margin-bottom:6px;"></div>
                <div class="skeleton" style="width:80%;height:14px;margin-bottom:16px;"></div>
                <div class="flex gap-3">
                  <div class="skeleton" style="width:60px;height:14px;"></div>
                  <div class="skeleton" style="width:80px;height:14px;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Empty state (hidden by default) -->
        <div id="empty-state" style="display:none;" class="text-center py-20">
          <div class="text-5xl mb-5">📭</div>
          <h2 class="text-xl font-bold text-brand-700 mb-2">暂无可用试卷</h2>
          <p class="text-brand-400">题库数据正在准备中，请稍后再来查看。</p>
        </div>

        <!-- Error state (hidden by default) -->
        <div id="error-state" style="display:none;" class="text-center py-20">
          <div class="text-5xl mb-5">⚠️</div>
          <h2 class="text-xl font-bold text-brand-700 mb-2">试卷加载失败</h2>
          <p class="text-brand-400 mb-4" id="error-msg">无法连接到服务器，请检查网络连接。</p>
          <button onclick="location.reload()" class="px-5 py-2 bg-brand-800 text-white rounded-lg font-medium text-sm hover:bg-brand-700 transition-colors">重新加载</button>
        </div>

      </main>
    </div>
  </div>

  <footer class="border-t border-brand-100 py-6 px-6 bg-white/50">
    <div class="max-w-7xl mx-auto text-center text-xs text-brand-400">
      <p>IELTS Study Portal · Data sourced from Cambridge IELTS past papers</p>
      <p class="mt-1">Built for academic IELTS (A类) candidates · 2026</p>
    </div>
  </footer>

  <script>
  // ==================== CONSTANTS ====================
  const CATEGORY_ALL = '__all__';
  const CATEGORY_OFFICIAL_CAMBRIDGE = '__official_cambridge__';
  const CATEGORY_PREDICTION = '__prediction__';

  const TOPIC_CONFIG = {
    'Science':       { cls: 'topic-science',      icon: '🔬', label: '科学' },
    'Environment':   { cls: 'topic-environment',  icon: '🌍', label: '环境' },
    'History':       { cls: 'topic-history',      icon: '📜', label: '历史' },
    'Economics':     { cls: 'topic-economics',    icon: '💼', label: '经济' },
    'Sociology':     { cls: 'topic-sociology',    icon: '👥', label: '社会学' },
    'Technology':    { cls: 'topic-technology',   icon: '⚙️', label: '科技' },
  };

  // ==================== STATE ====================
  let allTests = [];
  let currentCategory = CATEGORY_ALL;

  // ==================== TOPIC TAG ====================
  function getTopicTag(topic) {
    const cfg = TOPIC_CONFIG[topic] || { cls: 'topic-science', icon: '📖' };
    return `<span class="topic-tag ${cfg.cls}">${cfg.icon} ${topic}</span>`;
  }

  // ==================== DIFFICULTY STARS ====================
  function renderDifficulty(level) {
    let html = '<span class="flex items-center gap-1.5">';
    for (let i = 1; i <= 5; i++) {
      html += `<span class="difficulty-dot ${i <= level ? 'filled' : 'empty'}"></span>`;
    }
    html += `<span class="text-xs text-brand-400 ml-1">${['','入门','基础','中等','较难','挑战'][level]}</span>`;
    html += '</span>';
    return html;
  }

  // ==================== FORMAT TIME ====================
  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    if (mins < 60) return mins + ' 分钟';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return h + ' 小时' + (m > 0 ? ' ' + m + ' 分' : '');
  }

  // ==================== SOURCE GROUPING ====================
  function getSourceGroup(source) {
    if (!source) return '其他来源';

    // Cambridge tests: group by book number
    const camMatch = source.match(/Cambridge IELTS (\d+)/);
    if (camMatch) return `Cambridge IELTS ${camMatch[1]}`;

    // Prediction tests: extract PDF number from Chinese label
    const predMatch = source.match(/阅读(\d+)/);
    if (predMatch) return `阅读${predMatch[1]} 预测机经`;

    // Prediction tests: extract number from "Prediction N" pattern
    const predMatch2 = source.match(/Prediction (\d+)/);
    if (predMatch2) return `Prediction ${predMatch2[1]} 机经`;

    // Other prediction patterns (generic fallback)
    if (source.includes('Prediction') || source.includes('预测') || source.includes('机经')) {
      return '预测机经';
    }

    return source;
  }

  function getSourceShortLabel(source) {
    // Shorten source for display in card
    if (!source) return '';
    const camMatch = source.match(/Cambridge IELTS (\d+) Test (\d+) Passage (\d+)/);
    if (camMatch) return `Cam ${camMatch[1]} T${camMatch[2]} P${camMatch[3]}`;

    const predMatch = source.match(/阅读(\d+).*Passage (\d+)/);
    if (predMatch) return `阅读${predMatch[1]} P${predMatch[2]}`;

    // Handle "Prediction N — Passage N" pattern (legacy tests)
    const predMatch2 = source.match(/Prediction (\d+).*Passage (\d+)/);
    if (predMatch2) return `机经${predMatch2[1]} P${predMatch2[2]}`;

    // Truncate long source names
    if (source.length > 40) return source.substring(0, 38) + '…';
    return source;
  }

  // ==================== RENDER TEST CARD ====================
  function renderTestCard(test) {
    const excerpt = test.passageText
      .replace(/<[^>]*>/g, '')
      .replace(/\s+/g, ' ')
      .trim()
      .substring(0, 120) + '...';

    return `
      <div class="test-card bg-white rounded-2xl border border-brand-100 p-6 group" onclick="openMockTest('${test.id}')" title="点击进入机考模拟">
        <!-- Topic Tag -->
        <div class="mb-3">
          ${getTopicTag(test.topic)}
        </div>

        <!-- Title -->
        <h3 class="text-base font-serif font-bold text-brand-900 leading-snug mb-2 group-hover:text-brand-700 transition-colors">
          ${escapeHtml(test.title)}
        </h3>

        <!-- Excerpt -->
        <p class="text-xs text-brand-400 leading-relaxed mb-4 line-clamp-2">
          ${escapeHtml(excerpt)}
        </p>

        <!-- Meta Row: Source + Difficulty -->
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-brand-400 flex items-center gap-1" title="${escapeHtml(test.source)}">
            <span>📄</span> ${escapeHtml(getSourceShortLabel(test.source))}
          </span>
          ${renderDifficulty(test.difficulty)}
        </div>

        <!-- Meta Row: Questions + Time + CTA -->
        <div class="flex items-center justify-between pt-3 border-t border-brand-50">
          <div class="flex items-center gap-3">
            <span class="text-xs text-brand-500 font-medium flex items-center gap-1">
              <span>❓</span> ${test.questionCount} 题
            </span>
            <span class="text-xs text-brand-500 font-medium flex items-center gap-1">
              <span>⏱</span> ${formatTime(test.totalTime)}
            </span>
          </div>
          <span class="text-sm font-semibold text-brand-600 flex items-center gap-1">
            <span class="hidden sm:inline">进入模考</span>
            <span class="card-arrow text-lg">→</span>
          </span>
        </div>
      </div>
    `;
  }

  // ==================== RENDER CONTENT ====================
  function renderContentHeader(category, tests) {
    const header = document.getElementById('content-header');
    let title, subtitle;

    if (category === CATEGORY_ALL) {
      title = '📚 全部题目';
      subtitle = `共 ${tests.length} 套试卷，按话题领域分组展示`;
    } else if (category === CATEGORY_OFFICIAL_CAMBRIDGE) {
      title = '🏛️ Official Cambridge Mocks (官方真题)';
      subtitle = `${tests.length} 套 Cambridge IELTS 官方真题 · 含详细解析与答案`;
    } else if (category === CATEGORY_PREDICTION) {
      title = '🔮 预测机经';
      subtitle = `${tests.length} 套 IELTS 阅读预测机经`;
    } else {
      const cfg = TOPIC_CONFIG[category] || { icon: '📖', label: category };
      title = `${cfg.icon} ${cfg.label}`;
      subtitle = `${tests.length} 套试卷 · ${category} 话题领域`;
    }

    header.innerHTML = `
      <h1 class="text-2xl lg:text-3xl font-serif font-bold text-brand-900 mb-2">${title}</h1>
      <p class="text-brand-500">${subtitle}</p>
    `;
  }

  function renderSections(tests, category) {
    const container = document.getElementById('sections-container');

    if (tests.length === 0) {
      container.innerHTML = `
        <div class="text-center py-16">
          <div class="text-4xl mb-4">📭</div>
          <p class="text-brand-400">该分类下暂无试卷</p>
        </div>`;
      return;
    }

    // Group tests for display
    let groups;
    if (category === CATEGORY_ALL) {
      // Group by topic
      groups = groupBy(tests, t => t.topic);
      // Sort by count descending
      groups = sortGroupsByCount(groups);
    } else if (category === CATEGORY_OFFICIAL_CAMBRIDGE) {
      // Group by Cambridge book number
      groups = groupBy(tests, t => getSourceGroup(t.source));
      // Sort by book number
      groups = sortGroupsByKey(groups);
    } else if (category === CATEGORY_PREDICTION) {
      // Group by source (book/PDF)
      groups = groupBy(tests, t => getSourceGroup(t.source));
      // Sort alphabetically
      groups = sortGroupsByKey(groups);
    } else {
      // Topic category: group by source
      groups = groupBy(tests, t => getSourceGroup(t.source));
      groups = sortGroupsByKey(groups);
    }

    let html = '';
    for (const [groupName, groupTests] of Object.entries(groups)) {
      html += renderSection(groupName, groupTests, category);
    }
    container.innerHTML = html;
  }

  function renderSection(groupName, groupTests, category) {
    const totalQuestions = groupTests.reduce((s, t) => s + (t.questionCount || 0), 0);

    // Section header with icon
    let sectionIcon = '📂';
    let sectionLabel = groupName;

    if (category === CATEGORY_ALL) {
      // Group is a topic
      const cfg = TOPIC_CONFIG[groupName];
      if (cfg) {
        sectionIcon = cfg.icon;
        sectionLabel = cfg.label;
      }
    } else if (category === CATEGORY_OFFICIAL_CAMBRIDGE) {
      sectionIcon = '🏛️';
    } else if (category === CATEGORY_PREDICTION) {
      sectionIcon = '🔮';
    }

    const cardsHtml = groupTests.map(t => renderTestCard(t)).join('');

    return `
      <div class="mb-10">
        <div class="section-header mb-5">
          <h2 class="text-lg font-serif font-bold text-brand-800">
            ${sectionIcon} ${escapeHtml(sectionLabel)}
          </h2>
          <p class="text-xs text-brand-400 mt-1">
            ${groupTests.length} 套试卷 · ${totalQuestions} 道题目
          </p>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
          ${cardsHtml}
        </div>
      </div>
    `;
  }

  // ==================== SIDEBAR RENDERING ====================
  function renderSidebarTopics() {
    const container = document.getElementById('sidebar-topics');
    if (!container) return;

    const topicOrder = ['Science', 'Environment', 'Economics', 'History', 'Sociology', 'Technology'];
    let html = '';

    for (const topic of topicOrder) {
      const cfg = TOPIC_CONFIG[topic] || { icon: '📖', label: topic };
      const count = allTests.filter(t => t.topic === topic).length;
      html += `
        <div class="sidebar-item px-4 py-2.5 rounded-r-lg mb-0.5 flex items-center justify-between text-sm"
             data-category="${escapeHtml(topic)}" onclick="selectCategory('${escapeHtml(topic)}')">
          <span>${cfg.icon} ${cfg.label}</span>
          <span class="count-badge text-xs bg-brand-100 text-brand-600 px-2 py-0.5 rounded-full">${count}</span>
        </div>`;
    }
    container.innerHTML = html;
  }

  function updateSidebarCounts() {
    const officialCamCount = allTests.filter(t => {
      const mc = t.main_class || '';
      const src = t.source || '';
      return mc.includes('Official Cambridge') || mc.includes('官方真题') || src.includes('Cambridge IELTS');
    }).length;
    const predictionCount = allTests.filter(t => {
      const mc = t.main_class || '';
      const src = t.source || '';
      return !(mc.includes('Official Cambridge') || mc.includes('官方真题') || src.includes('Cambridge IELTS'));
    }).length;
    const allCount = allTests.length;

    const elAll = document.getElementById('count-all');
    const elOfficialCam = document.getElementById('count-official-cambridge');
    const elPred = document.getElementById('count-prediction');
    if (elAll) elAll.textContent = allCount;
    if (elOfficialCam) elOfficialCam.textContent = officialCamCount;
    if (elPred) elPred.textContent = predictionCount;
  }

  function setSidebarActive(category) {
    // Desktop sidebar
    document.querySelectorAll('.sidebar-item').forEach(item => {
      const cat = item.getAttribute('data-category');
      if (cat === category) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });

    // Mobile tabs
    document.querySelectorAll('#mobile-tabs .mobile-tab').forEach(tab => {
      const cat = tab.getAttribute('data-category');
      if (cat === category) {
        tab.classList.add('active');
      } else {
        tab.classList.remove('active');
      }
    });
  }

  function renderMobileTabs() {
    const container = document.getElementById('mobile-tabs');
    if (!container) return;

    let html = '';

    // All
    html += `<button class="mobile-tab active flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-brand-800 text-white border-none cursor-pointer transition-all"
              data-category="${CATEGORY_ALL}" onclick="selectCategory('${CATEGORY_ALL}')">📚 全部</button>`;

    // Official Cambridge
    html += `<button class="mobile-tab flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-red-50 text-red-700 border border-red-200 cursor-pointer transition-all hover:bg-red-100"
              data-category="${CATEGORY_OFFICIAL_CAMBRIDGE}" onclick="selectCategory('${CATEGORY_OFFICIAL_CAMBRIDGE}')">🏛️ 官方</button>`;

    // Topic tabs
    const topicOrder = ['Science', 'Environment', 'Economics', 'History', 'Sociology', 'Technology'];
    for (const topic of topicOrder) {
      const cfg = TOPIC_CONFIG[topic] || { icon: '📖', label: topic };
      html += `<button class="mobile-tab flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-white text-brand-600 border border-brand-200 cursor-pointer transition-all hover:bg-brand-50"
                data-category="${escapeHtml(topic)}" onclick="selectCategory('${escapeHtml(topic)}')">${cfg.icon} ${cfg.label}</button>`;
    }

    // Source tabs
    html += `<button class="mobile-tab flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium bg-white text-brand-600 border border-brand-200 cursor-pointer transition-all hover:bg-brand-50"
              data-category="${CATEGORY_PREDICTION}" onclick="selectCategory('${CATEGORY_PREDICTION}')">🔮 机经</button>`;

    container.innerHTML = html;

    // Mobile active tab style
    const style = document.createElement('style');
    style.textContent = `
      .mobile-tab.active {
        background: #243b53 !important;
        color: #fff !important;
        border-color: #243b53 !important;
      }
    `;
    document.head.appendChild(style);
  }

  // ==================== CATEGORY SELECTION ====================
  function selectCategory(category) {
    currentCategory = category;
    setSidebarActive(category);

    const tests = getTestsForCategory(category);
    renderContentHeader(category, tests);
    renderSections(tests, category);

    // Scroll to top of content on mobile
    if (window.innerWidth < 1024) {
      document.getElementById('content-header').scrollIntoView({ behavior: 'smooth' });
    }
  }

  function getTestsForCategory(category) {
    if (category === CATEGORY_ALL) return allTests;
    if (category === CATEGORY_OFFICIAL_CAMBRIDGE) {
      return allTests.filter(t => {
        const mc = t.main_class || '';
        const src = t.source || '';
        return mc.includes('Official Cambridge') || mc.includes('官方真题') || src.includes('Cambridge IELTS');
      });
    }
    if (category === CATEGORY_PREDICTION) {
      return allTests.filter(t => {
        const mc = t.main_class || '';
        const src = t.source || '';
        return !(mc.includes('Official Cambridge') || mc.includes('官方真题') || src.includes('Cambridge IELTS'));
      });
    }
    return allTests.filter(t => t.topic === category);
  }

  // ==================== LOAD & INIT ====================
  async function loadTests() {
    const sectionsContainer = document.getElementById('sections-container');
    const contentHeader = document.getElementById('content-header');
    const emptyState = document.getElementById('empty-state');
    const errorState = document.getElementById('error-state');

    try {
      const res = await fetch('./api/reading-tests.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allTests = data.tests || [];

      if (allTests.length === 0) {
        sectionsContainer.style.display = 'none';
        contentHeader.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      // Update sidebar counts and topic items
      updateSidebarCounts();
      renderSidebarTopics();
      renderMobileTabs();

      // Render default view (all tests)
      renderContentHeader(CATEGORY_ALL, allTests);
      renderSections(allTests, CATEGORY_ALL);
      setSidebarActive(CATEGORY_ALL);

    } catch (err) {
      console.error('Failed to load reading tests:', err);
      sectionsContainer.style.display = 'none';
      contentHeader.style.display = 'none';
      errorState.style.display = 'block';
      document.getElementById('error-msg').textContent = '无法加载题库数据：' + err.message;
    }
  }

  // ==================== NAVIGATE TO MOCK TEST ====================
  function openMockTest(testId) {
    window.location.href = '/mock-test.html?testId=' + encodeURIComponent(testId);
  }

  // ==================== UTILS ====================
  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function groupBy(arr, keyFn) {
    return arr.reduce((acc, item) => {
      const key = keyFn(item);
      if (!acc[key]) acc[key] = [];
      acc[key].push(item);
      return acc;
    }, {});
  }

  function sortGroupsByCount(groups) {
    // Convert to entries, sort by count desc, convert back
    return Object.fromEntries(
      Object.entries(groups).sort((a, b) => b[1].length - a[1].length)
    );
  }

  function sortGroupsByKey(groups) {
    return Object.fromEntries(
      Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]))
    );
  }

  // ==================== INIT ====================
  loadTests();
  console.log('📚 Reading Test Library loaded with sidebar navigation.');
  </script>
