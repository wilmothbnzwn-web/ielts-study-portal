<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>词包学习 — IELTS Study Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43' } }, fontFamily: { serif: ['Georgia', 'Times New Roman', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <script type="importmap">
  { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.0" } }
  </script>
  <style>
    body { background: #f8fafc; }
    .study-stage {
      min-height: 360px;
    }
    .study-stage .vocab-card {
      width: min(100%, 560px);
      min-height: 22rem;
      margin: 0 auto;
      box-shadow: 0 18px 52px rgba(16, 42, 67, 0.1);
    }
    .study-stage .vocab-card h3 {
      font-size: clamp(1.55rem, 4vw, 2.45rem);
      white-space: normal;
    }
    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #d9e2ec;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #334e68, #829ab1);
      transition: width 0.22s ease;
    }
    .control-btn {
      min-width: 116px;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }
    .control-btn:not(:disabled):hover {
      transform: translateY(-1px);
    }
    .control-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }
    #dont-know-btn.added {
      background: #f0fdf4;
      color: #065f46;
      border-color: #a7f3d0;
    }
  </style>
</head>
<body class="font-sans text-brand-800 antialiased min-h-screen flex flex-col">
  <div id="navbar-container"></div>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-7 sm:py-9 flex-grow w-full">
    <a id="back-to-library" href="/vocabulary" class="inline-flex items-center text-sm text-brand-500 hover:text-brand-900 no-underline mb-5">← 返回词书大厅</a>

    <section class="bg-white border border-brand-100 rounded-lg p-4 sm:p-6 mb-5">
      <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-5">
        <div>
          <p id="deck-tag" class="text-xs font-bold uppercase tracking-[0.18em] text-brand-400 mb-2">Deck</p>
          <h1 id="deck-title" class="text-2xl sm:text-3xl font-serif font-bold text-brand-900">加载词包中...</h1>
        </div>
        <div class="text-sm font-semibold text-brand-500 sm:text-right">
          <span id="progress-label">0 / 0</span>
        </div>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </section>

    <section id="study-stage" class="study-stage flex items-center justify-center py-4 sm:py-6">
      <p class="text-brand-400">Loading flashcard...</p>
    </section>

    <section class="bg-white border border-brand-100 rounded-lg p-4 sm:p-5 mt-4">
      <div class="flex items-center justify-between gap-2 sm:gap-3 flex-wrap">
        <button id="prev-btn" class="control-btn border border-brand-200 text-brand-700 rounded-lg px-4 py-2 text-sm font-semibold bg-white hover:bg-brand-50" onclick="goPrev()">Prev</button>
        <div class="flex items-center gap-2 flex-1 justify-center">
          <button id="dont-know-btn" class="control-btn border border-red-200 text-red-600 rounded-lg px-4 py-2 text-sm font-semibold bg-white hover:bg-red-50" onclick="markDontKnow()" title="不认识这个词 — 加入错题本">
            ✗ 不认识
          </button>
          <button id="know-btn" class="control-btn border border-green-200 text-green-600 rounded-lg px-4 py-2 text-sm font-semibold bg-white hover:bg-green-50" onclick="markKnown()" title="我认识这个词">
            ✓ 认识
          </button>
        </div>
        <button id="next-btn" class="control-btn bg-brand-800 text-white rounded-lg px-4 py-2 text-sm font-semibold hover:bg-brand-900" onclick="goNext()">Next</button>
      </div>
      <p id="completion-note" class="text-xs sm:text-sm text-brand-400 text-center mt-3">点击卡片查看同义词与例句</p>
    </section>
  </main>

  <footer class="border-t border-brand-100 py-6 px-6 bg-white/60 mt-8">
    <div class="max-w-6xl mx-auto text-center text-xs text-brand-400">
      <p>IELTS Study Portal · Flashcard study mode</p>
    </div>
  </footer>

  <script>
    window.SITE_BASE_PATH = window.location.hostname.endsWith('github.io') ? '/ielts-study-portal' : '';
    window.assetPath = function (path) { return window.SITE_BASE_PATH + path; };
    window.vocabApiPath = function () { return window.SITE_BASE_PATH ? window.SITE_BASE_PATH + '/api/vocabulary.json' : '/api/vocabulary'; };
    window.loadPageScript = function (src) {
      return new Promise(function (resolve, reject) {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };
  </script>
  <script>
    let currentDeck = null;
    let currentIndex = 0;

    function getDeckIdFromPath() {
      const match = window.location.pathname.match(/\/(?:vocab|vocabulary)\/deck\/([^/]+)/);
      if (match) return decodeURIComponent(match[1]);
      return new URLSearchParams(window.location.search).get('id') || '';
    }

    document.getElementById('back-to-library').href = window.SITE_BASE_PATH
      ? window.SITE_BASE_PATH + '/vocabulary.html'
      : '/vocabulary';

    Promise.all([
      window.loadPageScript(window.assetPath('/js/vocab-card.js')),
      window.loadPageScript(window.assetPath('/js/vocab-decks.js')),
    ]).then(initDeckStudy).catch(function (e) {
      console.error('Failed to load flashcard scripts', e);
      document.getElementById('study-stage').innerHTML = '<p class="text-brand-400 text-center py-12">词包加载失败，请刷新页面重试</p>';
    });

    function initDeckStudy() {
      fetch(window.vocabApiPath())
      .then(function (r) { return r.json(); })
      .then(function (words) {
        const decks = buildVocabularyDecks(words);
        const deckId = getDeckIdFromPath();
        currentDeck = findVocabularyDeck(decks, deckId);
        if (!currentDeck && decks.length) currentDeck = decks[0];

        if (!currentDeck) {
          document.getElementById('study-stage').innerHTML = '<p class="text-brand-400 text-center py-12">没有找到可学习的词包。</p>';
          return;
        }

        document.title = currentDeck.title + ' — IELTS Study Portal';
        document.getElementById('deck-title').textContent = currentDeck.title;
        document.getElementById('deck-tag').textContent = currentDeck.tag + ' · ' + currentDeck.wordCount + ' Words';
        renderCurrentCard();
      })
      .catch(function (e) {
        console.error('Failed to load deck', e);
        document.getElementById('study-stage').innerHTML = '<p class="text-brand-400 text-center py-12">词包加载失败，请刷新页面重试</p>';
      });
    }

    function renderCurrentCard() {
      if (!currentDeck) return;
      const word = currentDeck.words[currentIndex];
      window._vocabCardFlipped = new Set();
      document.getElementById('study-stage').innerHTML = VocabCard(word, {
        flippable: true,
        showAudio: true,
        showDelete: false,
        showTimestamp: false,
        cardIdPrefix: 'study',
      });
      updateControls();
    }

    function updateControls() {
      const total = currentDeck.words.length;
      const current = currentIndex + 1;
      const isFirst = currentIndex === 0;
      const isLast = currentIndex === total - 1;
      const percent = total ? (current / total) * 100 : 0;

      document.getElementById('progress-label').textContent = current + ' / ' + total;
      document.getElementById('progress-fill').style.width = percent + '%';
      document.getElementById('prev-btn').disabled = isFirst;
      document.getElementById('next-btn').disabled = isLast;
      document.getElementById('completion-note').textContent = isLast
        ? '本词包已到最后一张'
        : '点击卡片查看同义词与例句';
    }

    // Track word status: 'unseen' | 'known' | 'unknown'
    let wordStatus = {};
    const STATUS_UNSEEN = 'unseen';
    const STATUS_KNOWN = 'known';
    const STATUS_UNKNOWN = 'unknown';

    function getWordKey() {
      if (!currentDeck || !currentDeck.words[currentIndex]) return null;
      const w = currentDeck.words[currentIndex];
      return String(w.id || w.word);
    }

    function getCurrentWord() {
      if (!currentDeck) return null;
      return currentDeck.words[currentIndex] || null;
    }

    window.goPrev = function () {
      if (!currentDeck || currentIndex <= 0) return;
      currentIndex -= 1;
      renderCurrentCard();
    };

    window.goNext = function () {
      if (!currentDeck || currentIndex >= currentDeck.words.length - 1) return;
      currentIndex += 1;
      renderCurrentCard();
    };

    window.markDontKnow = async function () {
      const key = getWordKey();
      const word = getCurrentWord();
      if (!key || !word) return;

      wordStatus[key] = STATUS_UNKNOWN;
      updateJudgingButtons();

      // Add to mistake book
      if (window._mistakeBook && window._auth && window._auth.isAuthenticated) {
        const btn = document.getElementById('dont-know-btn');
        if (btn) { btn.textContent = '⏳ ...'; btn.disabled = true; }

        try {
          const deckId = getDeckIdFromPath();
          const payload = {
            word: word.word || '',
            pos: word.pos || '',
            chinese: word.chinese || '',
            definition: word.definition || '',
            example: word.example || '',
            synonyms: word.synonyms || [],
            theme: word.theme || '',
            difficulty: word.difficulty || 0,
            source: word.source || '',
          };
          await window._mistakeBook.addToMistakeBook(String(word.id || word.word), 'practice', deckId, {
            questionType: 'vocabulary',
            questionPayload: payload
          });
          console.log('[错题本·词汇] Added word:', word.word);
          if (btn) { btn.innerHTML = '✓ 已收录'; btn.classList.add('added'); }
        } catch (e) {
          console.error('[错题本·词汇] Failed to add word:', e);
          if (btn) { btn.innerHTML = '✗ 不认识'; btn.disabled = false; }
        }
      } else {
        // Not logged in — prompt user
        const wantLogin = confirm('登录后才能将生词加入错题本。是否去登录？');
        if (wantLogin) {
          window.location.href = './login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
        }
      }
    };

    window.markKnown = function () {
      const key = getWordKey();
      if (!key) return;

      wordStatus[key] = STATUS_KNOWN;
      updateJudgingButtons();

      // Auto-advance to next card
      setTimeout(function () {
        if (currentDeck && currentIndex < currentDeck.words.length - 1) {
          goNext();
        }
      }, 300);
    };

    function updateJudgingButtons() {
      const key = getWordKey();
      const status = key ? (wordStatus[key] || STATUS_UNSEEN) : STATUS_UNSEEN;
      const knowBtn = document.getElementById('know-btn');
      const dontKnowBtn = document.getElementById('dont-know-btn');

      if (status === STATUS_KNOWN) {
        if (knowBtn) { knowBtn.classList.add('bg-green-50'); knowBtn.style.opacity = '0.8'; }
        if (dontKnowBtn) { dontKnowBtn.classList.remove('bg-red-50'); dontKnowBtn.style.opacity = '1'; dontKnowBtn.disabled = false; }
      } else if (status === STATUS_UNKNOWN) {
        if (dontKnowBtn) { dontKnowBtn.classList.add('bg-red-50'); dontKnowBtn.style.opacity = '0.8'; }
        if (knowBtn) { knowBtn.classList.remove('bg-green-50'); knowBtn.style.opacity = '1'; }
      } else {
        if (knowBtn) { knowBtn.classList.remove('bg-green-50'); knowBtn.style.opacity = '1'; }
        if (dontKnowBtn) { dontKnowBtn.classList.remove('bg-red-50'); dontKnowBtn.style.opacity = '1'; dontKnowBtn.disabled = false; dontKnowBtn.innerHTML = '✗ 不认识'; }
      }
    }

    document.addEventListener('keydown', function (event) {
      if (event.key === 'ArrowLeft') goPrev();
      if (event.key === 'ArrowRight' && !event.shiftKey) goNext();
      if (event.key === 'ArrowRight' && event.shiftKey) { event.preventDefault(); markKnown(); }
      if (event.key === 'ArrowDown') { event.preventDefault(); markDontKnow(); }
    });
  </script>

  <script type="module">
    const base = window.SITE_BASE_PATH || '';
    const { renderNavbar } = await import(base + '/js/navbar.js');
    const { initAuth, authStore } = await import(base + '/js/auth-store.js');
    const { addToMistakeBook } = await import(base + '/js/db.js');

    // Bridge for inline script
    window._mistakeBook = { addToMistakeBook };
    window._auth = authStore;

    try {
      await initAuth();
      console.log('[错题本·词汇] Bridge loaded, user:', authStore.user ? authStore.user.email : 'anonymous');
    } catch (e) {
      console.warn('[错题本·词汇] Auth warning:', e.message);
    }
    renderNavbar();
  </script>
</body>
</html>
