[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  included_files = ["data/**"]

[[redirects]]
  from = "/js/env.js"
  to = "/.netlify/functions/env"
  status = 200

[[redirects]]
  from = "/vocab"
  to = "/vocabulary.html"
  status = 200

[[redirects]]
  from = "/vocabulary"
  to = "/vocabulary.html"
  status = 200

[[redirects]]
  from = "/vocab/deck/*"
  to = "/vocab-deck.html"
  status = 200

[[redirects]]
  from = "/vocabulary/deck/*"
  to = "/vocab-deck.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
